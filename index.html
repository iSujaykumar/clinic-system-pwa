<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic System</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e40af">
</head>

<body>

<div class="container">

<h1>Clinic System</h1>

<div class="top-buttons">
<button onclick="showForm()">New Patient</button>
<button onclick="showHistory()">Patient Records</button>
</div>

<h2>Today's Patients: <span id="todayCount">0</span></h2>

<div id="formSection">

<h2>Patient Entry</h2>

<div class="form-grid">

<div class="form-column">

<label>Patient Name</label>
<input id="name" type="text" required>

<label>Date</label>
<input id="date" type="date" required>

<label>Mobile</label>
<input id="mobile" type="tel" required>

<label>Weight (kg)</label>
<input id="weight" type="number" step="0.1" placeholder="e.g. 65">

</div>

<div class="form-column">

<label>Age</label>
<input id="age" type="number" placeholder="e.g. 30">

<label>Sex</label>
<input id="sex" type="text" placeholder="e.g. Male/Female">

<label>Height (cm)</label>
<input id="height" type="number" step="0.1" placeholder="e.g. 170">

<label>RR</label>
<input id="rr" type="number" placeholder="e.g. 16">

</div>

<div class="form-column">

<label>Pulse (bpm)</label>
<input id="pulse" type="number" placeholder="e.g. 72">

<label>BP</label>
<input id="bp" type="text" placeholder="e.g. 120/80">

<label>Temp (°C)</label>
<input id="temp" type="number" step="0.1" placeholder="e.g. 37.0">

<label>Blood Sugar</label>
<input id="sugar" type="number" placeholder="e.g. 100">

</div>

</div>

<div class="section">
<h3>Present Complaints</h3>
<textarea id="complaints"></textarea>
</div>

<div class="section">
<h3>Investigation</h3>
<textarea id="investigation"></textarea>
</div>

<div class="section">
<h3>Follow Up</h3>
<textarea id="followup"></textarea>
</div>

<br>

<div class="top-buttons" style="justify-content: center;">
<button onclick="savePatient()">Save Patient</button>
<button onclick="printSheet()">Print Sheet</button>
</div>

</div>

<div id="historySection" style="display:none">

<h2>Patient Records</h2>

<input id="searchBox" type="text" placeholder="Search patient" onkeyup="searchPatient()">

<div style="overflow-x:auto;">
<table>
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="patientTable"></tbody>
</table>
</div>

</div>

</div>

<script src="database.js"></script>
<script src="app.js"></script>
<script src="print.js"></script>
<script>
// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(registration => console.log('ServiceWorker registration successful'))
      .catch(err => console.log('ServiceWorker registration failed: ', err));
  });
}
</script>

</body>
</html>
